<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Legends Cup</title>
  <meta name="description" content="Play Legends Cup free in your browser — draft legends, win the cup." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .play-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 18px 14px; }
    .play-title { color: var(--gold); font-weight: 900; letter-spacing: 0.5px; font-size: 20px; }
    .play-frame {
      width: 100%; max-width: 460px;
      aspect-ratio: 853 / 1844;
      max-height: 88vh;
      border-radius: 26px; overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 26px 64px rgba(0, 0, 0, 0.6), 0 0 60px rgba(245, 197, 66, 0.10);
      background: #04081a;
    }
    .play-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
    .play-note { color: var(--muted); font-size: 13px; }
    .play-back { color: var(--muted); font-weight: 700; font-size: 14px; }
    .play-back:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="play-wrap">
    <a class="play-back" href="index.html">← Back to site</a>
    <div class="play-title"><span class="crown">♛</span> Legends Cup</div>
    <div class="play-frame">
      <iframe src="play/" title="Legends Cup" allow="autoplay; fullscreen"></iframe>
    </div>
    <p class="play-note">Free in your browser — best experienced on a phone.</p>
  </div>
</body>
</html>
